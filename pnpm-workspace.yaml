packages:
  - packages/*
  - examples/*
  - docs

linkWorkspacePackages: true
preferWorkspacePackages: true
catalogMode: prefer

onlyBuiltDependencies:
  - esbuild

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.2
  vite-plus: 0.2.2
  typescript: ^6.0.0
  typestyles: ^0.11.2
  '@typestyles/vite': ^0.4.4
  react: ^19.0.0
  react-dom: ^19.0.0
  react-aria-components: ^1.19.0
  '@internationalized/date': ^3.12.2
  '@types/react': ^18.2.0
  '@types/react-dom': ^18.2.0
  '@vitejs/plugin-react': ^5.0.0
  astro: ^5.14.0

overrides:
  vite: 'catalog:'
  '@var-ui/docs>vite': 'npm:vite@^8.1.3'

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: '*'
